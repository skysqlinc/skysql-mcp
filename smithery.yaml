# smithery.yaml — LOCAL (stdio) distribution
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      skysqlApiKey:
        type: string
        title: "SkySQL API Key"
        description: "Your SkySQL API key for accessing SkySQL services"
    required: [skysqlApiKey]
  commandFunction: |-
    (config) => ({
      command: "python",
      args: ["mcp-server/server.py"],
      env: {
        MCP_DEBUG: "False",
        SKYSQL_API_KEY: config.skysqlApiKey
      }
    })
